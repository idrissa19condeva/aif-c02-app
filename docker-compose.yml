services:
  # ==========================================
  # Caddy : reverse proxy + HTTPS automatique
  # network_mode: host pour contourner les problèmes de NAT/forwarding
  # du bridge Docker → accède directement à internet via ens3 du VPS
  # ==========================================
  caddy:
    image: caddy:2-alpine
    container_name: aif-caddy
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - aif-app

  # ==========================================
  # App AIF-C02 : Nginx servant le build React
  # Exposé uniquement sur localhost:8080 (accès via Caddy host network)
  # ==========================================
  aif-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aif-app
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"
    networks:
      - aif-network

networks:
  aif-network:
    driver: bridge

volumes:
  caddy_data:    # Stocke les certificats Let's Encrypt
  caddy_config:
